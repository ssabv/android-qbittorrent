name: Build libtorrent Dependencies

on:
  workflow_dispatch:
    inputs:
      libtorrent_version:
        description: 'libtorrent version'
        default: '2.0.9'
        required: false
      boost_version:
        description: 'Boost version'
        default: '1.84.0'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3 python3-pip wget tar gzip
        
    - name: Build Boost for Android arm64
      run: |
        cd /tmp
        
        BOOST_VERSION=1.84.0
        echo "=== Downloading Boost $BOOST_VERSION ==="
        wget -q https://boostorg.jfrog.io/artifactory/main/release/$BOOST_VERSION/source/boost_$BOOST_VERSION.tar.gz
        
        tar -xzf boost_$BOOST_VERSION.tar.gz
        cd boost_$BOOST_VERSION
        
        echo "=== Bootstrapping Boost ==="
        ./bootstrap.sh --with-libraries=system,filesystem,date_time
        
        echo "=== Building Boost ==="
        cat > user-config.jam << 'EOF'
using clang : arm64 : aarch64-linux-android21-clang++ : : <archflags>-march=armv8-a <linkflags>-Wl,--gc-sections ;
EOF
        
        ./b2 install \
          toolset=clang-arm64 \
          variant=release \
          link=static \
          threading=multi \
          cxxstd=17 \
          --prefix=/tmp/boost-install \
          --with-system \
          --with-filesystem \
          --with-date_time \
          -j$(nproc) \
          stage
        
        echo "=== Boost build complete ==="
        ls -la /tmp/boost-install/lib/
        
    - name: Build OpenSSL for Android arm64
      run: |
        cd /tmp
        
        echo "=== Downloading OpenSSL 3.2.1 ==="
        wget -q https://github.com/openssl/openssl/releases/download/openssl-3.2.1/openssl-3.2.1.tar.gz
        tar -xzf openssl-3.2.1.tar.gz
        cd openssl-3.2.1
        
        echo "=== Configuring OpenSSL ==="
        ./Configure android-arm64 --prefix=/tmp/openssl-install
        
        echo "=== Building OpenSSL ==="
        make -j$(nproc)
        make install_sw
        
        echo "=== OpenSSL build complete ==="
        ls -la /tmp/openssl-install/lib/
        
    - name: Build libtorrent for Android arm64
      run: |
        cd /tmp
        
        LIBTORRENT_VERSION=2.0.9
        echo "=== Downloading libtorrent $LIBTORRENT_VERSION ==="
        wget -q https://github.com/arvidn/libtorrent/releases/download/v$LIBTORRENT_VERSION/libtorrent-$LIBTORRENT_VERSION.tar.gz
        tar -xzf libtorrent-$LIBTORRENT_VERSION.tar.gz
        cd libtorrent-$LIBTORRENT_VERSION
        
        echo "=== Configuring libtorrent ==="
        
        ./configure \
          --prefix=/tmp/libtorrent-install \
          --enable-arch=native \
          --disable-shared-encryption \
          --with-boost=/tmp/boost-install \
          --with-openssl=/tmp/openssl-install \
          --host=aarch64-linux-android \
          CXXFLAGS="-stdlib=libc++ -fPIC -fvisibility=hidden -fno-exceptions -fno-rtti -march=armv8-a" \
          CXX=aarch64-linux-android21-clang++ \
          CC=aarch64-linux-android21-clang
        
        echo "=== Building libtorrent ==="
        make -j$(nproc)
        
        echo "=== Installing libtorrent ==="
        make install
        
        echo "=== libtorrent build complete ==="
        ls -la /tmp/libtorrent-install/lib/
        
    - name: Prepare jniLibs directory
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Copy libtorrent
        cp /tmp/libtorrent-install/lib/libtorrent.so app/src/main/jniLibs/arm64-v8a/
        
        # Copy OpenSSL
        cp /tmp/openssl-install/lib/libssl.so app/src/main/jniLibs/arm64-v8a/
        cp /tmp/openssl-install/lib/libcrypto.so app/src/main/jniLibs/arm64-v8a/
        
        # Copy Boost (if available as .so, otherwise copy .a)
        if [ -f /tmp/boost-install/lib/libboost_system.so ]; then
          cp /tmp/boost-install/lib/libboost_system.so app/src/main/jniLibs/arm64-v8a/
        elif [ -f /tmp/boost-install/lib/libboost_system.a ]; then
          cp /tmp/boost-install/lib/libboost_system.a app/src/main/jniLibs/arm64-v8a/
        fi
        
        if [ -f /tmp/boost-install/lib/libboost_filesystem.so ]; then
          cp /tmp/boost-install/lib/libboost_filesystem.so app/src/main/jniLibs/arm64-v8a/
        elif [ -f /tmp/boost-install/lib/libboost_filesystem.a ]; then
          cp /tmp/boost-install/lib/libboost_filesystem.a app/src/main/jniLibs/arm64-v8a/
        fi
        
        if [ -f /tmp/boost-install/lib/libboost_date_time.so ]; then
          cp /tmp/boost-install/lib/libboost_date_time.so app/src/main/jniLibs/arm64-v8a/
        elif [ -f /tmp/boost-install/lib/libboost_date_time.a ]; then
          cp /tmp/boost-install/lib/libboost_date_time.a app/src/main/jniLibs/arm64-v8a/
        fi
        
        echo "=== Final jniLibs contents ==="
        ls -la app/src/main/jniLibs/arm64-v8a/
        
    - name: Upload libtorrent artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-libtorrent-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30