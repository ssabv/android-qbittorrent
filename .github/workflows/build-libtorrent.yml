name: Build libtorrent Dependencies

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-libtorrent.yml'
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Verify NDK toolchain - Debug
      run: |
        echo "=== DEBUG: NDK Verification ==="
        
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        
        if [ -d "$ANDROID_HOME/ndk" ]; then
          echo "NDK versions available:"
          ls -la $ANDROID_HOME/ndk/
        else
          echo "ERROR: No NDK directory found!"
          exit 1
        fi
        
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        
        if [ -d "$NDK_PATH" ]; then
          echo "Using NDK: $NDK_PATH"
        else
          echo "ERROR: NDK version $NDK_VERSION not found!"
          exit 1
        fi
        
        echo ""
        echo "=== Compiler Check ==="
        
        # Try finding clang++
        CLANGPP=$(find $NDK_PATH -name "clang++" -type f 2>/dev/null | head -1)
        if [ -n "$CLANGPP" ]; then
          echo "Found clang++: $CLANGPP"
          $CLANGPP --version 2>&1 | head -3
        else
          echo "ERROR: clang++ not found in NDK"
          find $NDK_PATH -name "clang*" -type f 2>/dev/null | head -10
        fi
        
        echo ""
        echo "=== CMake Check ==="
        if command -v cmake &> /dev/null; then
          cmake --version | head -3
        else
          echo "ERROR: cmake not found"
        fi

    - name: Build Step 1 - Hello JNI - Debug
      run: |
        echo "=== Step 1: Building hello-jni.so ==="
        
        mkdir -p /tmp/hello-jni
        cd /tmp/hello-jni
        
        # Create source file
        echo '#include <stdio.h>' > hello.c
        echo 'int sayHello() { printf("Hello from JNI!\n"); return 42; }' >> hello.c
        cat hello.c
        
        # Create CMakeLists.txt  
        echo 'cmake_minimum_required(VERSION 3.22.1)' > CMakeLists.txt
        echo 'project(hello-jni)' >> CMakeLists.txt
        echo 'add_library(hello-jni SHARED hello.c)' >> CMakeLists.txt
        cat CMakeLists.txt
        
        mkdir -p build
        cd build
        
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        
        echo "=== Running CMake ==="
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_VERBOSE_MAKEFILE=ON
        
        echo "=== CMake Output End ==="
        
        echo "=== Running Build ==="
        cmake --build . -- -j$(nproc) 2>&1
        
        echo "=== Build Complete ==="
        ls -la
        
        SO_FILE=$(find . -name "*.so" 2>/dev/null | head -1)
        echo "Found SO: $SO_FILE"

    - name: Copy to jniLibs
      run: |
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        
        SO_FILE=$(find /tmp/hello-jni/build -name "*.so" 2>/dev/null | head -1)
        if [ -n "$SO_FILE" ] && [ -f "$SO_FILE" ]; then
          cp "$SO_FILE" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
          ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          echo "SUCCESS: Copied libhello-jni.so"
        else
          echo "ERROR: No .so file found to copy"
          ls -la /tmp/hello-jni/build/
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-libtorrent-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30