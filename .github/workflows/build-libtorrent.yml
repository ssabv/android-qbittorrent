name: Build libtorrent Dependencies

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-libtorrent.yml'
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Verify NDK toolchain
      run: |
        echo "=== NDK Toolchain Verification ==="
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        echo "NDK Path: $NDK_PATH"
        ls -la $NDK_PATH/
        echo "=== Clang Compiler ==="
        aarch64-linux-android21-clang++ --version
        
    - name: Build Step 1 - Hello JNI
      run: |
        echo "=== Step 1: Building hello-jni.so ==="
        
        mkdir -p /tmp/hello-jni
        cd /tmp/hello-jni
        
        # Write hello.c using printf
        printf '#include <stdio.h>\n#include <stdlib.h>\nint sayHello() { printf("Hello from JNI!\\n"); return 42; }' > hello.c
        cat hello.c
        
        # Create CMakeLists.txt
        printf 'cmake_minimum_required(VERSION 3.22.1)\nproject(hello-jni)\nadd_library(hello-jni SHARED hello.c)\ntarget_compile_options(hello-jni PRIVATE -fPIC)' > CMakeLists.txt
        
        mkdir -p build
        cd build
        
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release
        
        cmake --build . -- -j$(nproc)
        
        echo "=== Build Output ==="
        ls -la *.so 2>/dev/null || ls -la
        
        echo "=== Copy to jniLibs ==="
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        
        # Find the .so file
        SO_FILE=$(find . -name "*.so" | head -1)
        if [ -n "$SO_FILE" ]; then
          cp "$SO_FILE" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
          ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        else
          echo "ERROR: No .so file found!"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-libtorrent-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30