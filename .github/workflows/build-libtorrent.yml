name: Build libtorrent Dependencies

on:
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Verify NDK toolchain
      run: |
        echo "=== NDK Toolchain Verification ==="
        
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        echo "NDK Path: $NDK_PATH"
        echo "NDK Contents:"
        ls -la $NDK_PATH/
        
        echo ""
        echo "=== Clang Compiler ==="
        which aarch64-linux-android21-clang++
        aarch64-linux-android21-clang++ --version
        
        echo ""
        echo "=== CMake ==="
        which cmake
        cmake --version
        
    - name: Build Step 1 - Hello JNI
      if: github.event.inputs.step == '1' || github.event.inputs.step == ''
      run: |
        echo "=== Step 1: Building hello-jni.so ==="
        
        mkdir -p /tmp/hello-jni
        cd /tmp/hello-jni
        
        # Create hello.c
        cat > hello.c << 'EOF'
#include <stdio.h>
#include <stdlib.h>

JNIEXPORT jint JNICALL Java_com_example_hello_HelloNative_sayHello(JNIEnv *env, jobject this) {
    printf("Hello from JNI!\n");
    return 42;
}
EOF
        
        # Create CMakeLists.txt
        cat > CMakeLists.txt << 'EOF'
cmake_minimum_required(VERSION 3.22.1)
project(hello-jni)

add_library(hello-jni SHARED hello.c)
target_compile_options(hello-jni PRIVATE -fPIC -fvisibility=hidden)
EOF
        
        # Create Android.mk
        cat > Android.mk << 'EOF'
LOCAL_PATH := $(call my-dir)

include $(CLEAR_VARS)
LOCAL_MODULE    := hello-jni
LOCAL_SRC_FILES := hello.c
include $(BUILD_SHARED_LIBRARY)
EOF
        
        # Build with CMake
        mkdir -p build
        cd build
        
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release
        
        cmake --build . -- -j$(nproc)
        
        echo "=== Build Output ==="
        ls -la
        
        echo "=== Copy to jniLibs ==="
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        cp libhello-jni.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
        ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

    - name: Upload Step 1 artifact
      if: github.event.inputs.step == '1' || github.event.inputs.step == ''
      uses: actions/upload-artifact@v4
      with:
        name: android-libtorrent-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30