name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Verify NDK toolchain
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        if [ ! -d "$NDK_PATH" ]; then
          echo "ERROR: NDK version $NDK_VERSION not found!"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDKs found"
          exit 1
        fi
        echo "Using NDK: $NDK_PATH"
        TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
        echo "Toolchain: $TOOLCHAIN"
        ls $TOOLCHAIN/bin/aarch64-linux-android*-clang 2>/dev/null | head -5

    - name: Build Step 1 - Hello JNI
      run: |
        set -e
        echo "=== Step 1: Building hello-jni.so ==="
        mkdir -p /tmp/hello-jni
        printf '#include <stdio.h>\nint sayHello() { printf("Hello from JNI!\\n"); return 42; }\n' > /tmp/hello-jni/hello.c
        printf 'cmake_minimum_required(VERSION 3.22.1)\nproject(hello-jni)\nadd_library(hello-jni SHARED hello.c)\n' > /tmp/hello-jni/CMakeLists.txt
        mkdir -p /tmp/hello-jni/build
        cd /tmp/hello-jni/build
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(nproc) 2>&1
        SO_FILE=$(find . -name "*.so" 2>/dev/null | head -1)
        echo "Found SO: $SO_FILE"

    - name: Build Step 2 - OpenSSL
      run: |
        set -e
        echo "=== Step 2: Getting OpenSSL for Android arm64-v8a ==="
        
        cd /tmp
        
        echo "=== Downloading OpenSSL 3.4.1 static libs for arm64-v8a ==="
        curl -fsSL "https://github.com/217heidai/openssl_for_android/releases/download/3.4.1/OpenSSL_3.4.1_arm64-v8a.tar.gz" -o openssl-arm64.tar.gz
        
        echo "=== Extracting ==="
        mkdir -p openssl-arm64 && tar -xzf openssl-arm64.tar.gz -C openssl-arm64 --strip-components=1
        
        echo "=== Checking contents ==="
        ls -la openssl-arm64/
        ls -la openssl-arm64/lib/ 2>/dev/null || ls -la openssl-arm64/ | grep -v "^d"
        
        if [ -d "openssl-arm64/lib" ]; then
          SSL_LIB="$PWD/openssl-arm64/lib/libssl.a"
          CRYPTO_LIB="$PWD/openssl-arm64/lib/libcrypto.a"
        elif [ -f "openssl-arm64/libssl.a" ]; then
          SSL_LIB="$PWD/openssl-arm64/libssl.a"
          CRYPTO_LIB="$PWD/openssl-arm64/libcrypto.a"
        else
          SSL_LIB=""
          CRYPTO_LIB=""
        fi
        
        echo "=== Verifying static libs ==="
        if [ -n "$SSL_LIB" ] && [ -f "$SSL_LIB" ]; then
          echo "FOUND libssl.a: $SSL_LIB"
          file "$SSL_LIB"
          ls -lh "$SSL_LIB"
        else
          echo "ERROR: libssl.a not found"
          exit 1
        fi
        
        if [ -n "$CRYPTO_LIB" ] && [ -f "$CRYPTO_LIB" ]; then
          echo "FOUND libcrypto.a: $CRYPTO_LIB"
          file "$CRYPTO_LIB"
          ls -lh "$CRYPTO_LIB"
        else
          echo "ERROR: libcrypto.a not found"
          exit 1
        fi
        
        OPENSSL_DIR="$PWD/openssl-arm64"
        echo "OPENSSL_DIR=$OPENSSL_DIR" >> $GITHUB_ENV

    - name: Copy to jniLibs
      run: |
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        
        SO_FILE=$(find /tmp/hello-jni/build -name "*.so" 2>/dev/null | head -1)
        if [ -n "$SO_FILE" ] && [ -f "$SO_FILE" ]; then
          cp "$SO_FILE" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
          echo "Copied libhello-jni.so"
        fi
        
        echo "=== jniLibs/arm64-v8a contents ==="
        ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        
        echo "=== OpenSSL static libs available at $OPENSSL_DIR ==="
        find "$OPENSSL_DIR" -name "*.a" 2>/dev/null

    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: build-native

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Download native artifact
      id: download-native
      uses: actions/download-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a

    - name: Check downloaded files
      run: |
        echo "=== Downloaded jniLibs ==="
        ls -la app/src/main/jniLibs/arm64-v8a/
        
        echo "=== Verify libhello-jni.so ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libhello-jni.so" ]; then
          echo "SUCCESS: libhello-jni.so exists"
          file app/src/main/jniLibs/arm64-v8a/libhello-jni.so
          readelf -d app/src/main/jniLibs/arm64-v8a/libhello-jni.so | head -10
        else
          echo "ERROR: libhello-jni.so not found!"
          exit 1
        fi
        
        echo "=== Build APK ==="
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17_X64
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -50
        
        echo "=== APK Build Complete ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"

    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        echo "=== Starting Gradle build ==="
        ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle-output.txt
        echo "=== Gradle output (last 200 lines) ==="
        tail -200 /tmp/gradle-output.txt

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk