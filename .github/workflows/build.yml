name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Prepare jniLibs with stub libraries
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Create minimal stub .so files (1KB each)
        # These are placeholders - replace with real libtorrent .so files
        for lib in libtorrent libssl libcrypto libboost_system libboost_filesystem libboost_date_time; do
          echo "STUB" > app/src/main/jniLibs/arm64-v8a/${lib}.so
        done
        
        ls -la app/src/main/jniLibs/arm64-v8a/
        
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        
        # Try to build, might fail on native linking but should get far
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -80
        
    - name: Upload APK if successful
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk