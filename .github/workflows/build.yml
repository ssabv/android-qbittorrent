name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Verify NDK toolchain
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        if [ ! -d "$NDK_PATH" ]; then
          echo "ERROR: NDK version $NDK_VERSION not found!"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDKs found"
          exit 1
        fi
        echo "Using NDK: $NDK_PATH"
        TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
        echo "Toolchain: $TOOLCHAIN"
        ls $TOOLCHAIN/bin/aarch64-linux-android*-clang 2>/dev/null | head -5

    - name: Build Step 1 - Hello JNI
      run: |
        set -e
        echo "=== Step 1: Building hello-jni.so ==="
        mkdir -p /tmp/hello-jni
        printf '#include <stdio.h>\nint sayHello() { printf("Hello from JNI!\\n"); return 42; }\n' > /tmp/hello-jni/hello.c
        printf 'cmake_minimum_required(VERSION 3.22.1)\nproject(hello-jni)\nadd_library(hello-jni SHARED hello.c)\n' > /tmp/hello-jni/CMakeLists.txt
        mkdir -p /tmp/hello-jni/build
        cd /tmp/hello-jni/build
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(nproc) 2>&1
        SO_FILE=$(find . -name "*.so" 2>/dev/null | head -1)
        echo "Found SO: $SO_FILE"

    - name: Build Step 2 - OpenSSL
      run: |
        set -e
        echo "=== Step 2: Getting OpenSSL for Android arm64-v8a ==="
        
        mkdir -p /tmp/openssl-install/lib
        cd /tmp/openssl-install
        
        echo "=== Downloading OpenSSL 3.4.1 prebuilt for arm64-v8a ==="
        curl -fsSL "https://github.com/217heidai/openssl_for_android/releases/download/3.4.1/OpenSSL_3.4.1_arm64-v8a.tar.gz" -o openssl.tar.gz 2>/dev/null || \
        curl -fsSL "https://github.com/TaurusTLS-Developers/OpenSSL-Distribution/releases/download/v4.0.0/openssl-4.0.0-Android-arm64.zip" -o openssl.zip
        
        echo "=== Extracting ==="
        if [ -f "openssl.zip" ]; then
          unzip -o openssl.zip
          find . -name "*.so" -exec cp {} /tmp/openssl-install/lib/ \; 2>/dev/null
          find . -name "include" -type d -exec cp -r {} /tmp/openssl-install/ \; 2>/dev/null
        else
          tar -xzf openssl.tar.gz
          if [ -d "openssl_3.4.1_arm64-v8a/lib" ]; then
            cp openssl_3.4.1_arm64-v8a/lib/* /tmp/openssl-install/lib/ 2>/dev/null || true
          fi
        fi
        
        echo "=== Checking for .so files ==="
        find . -name "*.so" 2>/dev/null | head -10
        
        echo "=== Verifying libraries ==="
        ls -la /tmp/openssl-install/lib/
        for f in /tmp/openssl-install/lib/libssl.so /tmp/openssl-install/lib/libcrypto.so; do
          if [ -f "$f" ]; then
            echo "FOUND: $f"
            file "$f"
          else
            echo "MISSING: $f"
          fi
        done

    - name: Copy to jniLibs
      run: |
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        
        SO_SSL=$(find /tmp/openssl-install -name "libssl.so" 2>/dev/null | head -1)
        SO_CRYPTO=$(find /tmp/openssl-install -name "libcrypto.so" 2>/dev/null | head -1)
        
        if [ -n "$SO_SSL" ] && [ -f "$SO_SSL" ]; then
          cp "$SO_SSL" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          echo "Copied libssl.so from $SO_SSL"
        else
          echo "No libssl.so found to copy"
        fi
        
        if [ -n "$SO_CRYPTO" ] && [ -f "$SO_CRYPTO" ]; then
          cp "$SO_CRYPTO" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          echo "Copied libcrypto.so from $SO_CRYPTO"
        else
          echo "No libcrypto.so found to copy"
        fi
        
        SO_FILE=$(find /tmp/hello-jni/build -name "*.so" 2>/dev/null | head -1)
        if [ -n "$SO_FILE" ] && [ -f "$SO_FILE" ]; then
          cp "$SO_FILE" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
        fi
        
        echo "=== jniLibs/arm64-v8a contents ==="
        ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        
        echo "=== Verify OpenSSL libs ==="
        for f in libssl.so libcrypto.so; do
          if [ -f "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/$f" ]; then
            echo "FOUND: $f"
            file $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/$f
            readelf -d $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/$f | head -5
          else
            echo "MISSING: $f"
          fi
        done

    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: build-native

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Download native artifact
      id: download-native
      uses: actions/download-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a

    - name: Check downloaded files
      run: |
        echo "=== Downloaded jniLibs ==="
        ls -la app/src/main/jniLibs/arm64-v8a/
        
        echo "=== Verify libssl.a ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libssl.a" ]; then
          echo "SUCCESS: libssl.a exists"
          file app/src/main/jniLibs/arm64-v8a/libssl.a
        else
          echo "ERROR: libssl.a not found!"
          ls -la app/src/main/jniLibs/arm64-v8a/*.a 2>/dev/null || echo "No .a files"
          exit 1
        fi
        
        echo "=== Verify libcrypto.a ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libcrypto.a" ]; then
          echo "SUCCESS: libcrypto.a exists"
          file app/src/main/jniLibs/arm64-v8a/libcrypto.a
        else
          echo "ERROR: libcrypto.a not found!"
          exit 1
        fi
        
        echo "=== OpenSSL include headers ==="
        ls /tmp/openssl-install/lib/openssl_3.4.0_arm64-v8a/include/ 2>/dev/null || echo "No include dir in lib"

    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        echo "=== Starting Gradle build ==="
        ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle-output.txt
        echo "=== Gradle output (last 200 lines) ==="
        tail -200 /tmp/gradle-output.txt

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk