name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Download precompiled libraries from frostwire jlibtorrent
      run: |
        # Create jniLibs directory
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Download frostwire jlibtorrent Android arm64 release with redirect follow
        JAR_URL="https://github.com/frostwire/frostwire-jlibtorrent/releases/download/release/2.0.12.7/jlibtorrent-android-arm64-2.0.12.7.jar"
        
        echo "Downloading from: $JAR_URL"
        
        # Use curl with -L to follow redirects
        curl -L -o /tmp/jlibtorrent-android-arm64.jar "$JAR_URL" --retry 3 --retry-delay 5
        
        if [ -f /tmp/jlibtorrent-android-arm64.jar ]; then
          echo "Downloaded JAR size: $(ls -lh /tmp/jlibtorrent-android-arm64.jar | awk '{print $5}')"
          
          # Check if it's actually a JAR/ZIP
          file /tmp/jlibtorrent-android-arm64.jar
          
          # Extract .so files from JAR
          cd /tmp
          unzip -o jlibtorrent-android-arm64.jar "lib/*.so" -d extracted/
          
          # List extracted files
          ls -la extracted/lib/ 2>/dev/null || echo "No lib directory found"
          
          # Check if there are any .so files anywhere in the jar
          unzip -l jlibtorrent-android-arm64.jar | grep "\.so" || echo "No .so files in JAR"
          
          # Copy to project jniLibs
          if [ -d "extracted/lib" ]; then
            cp extracted/lib/*.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
          fi
          
          ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        else
          echo "Failed to download JAR"
          exit 1
        fi
        
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk