name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_NDK_VERSION: "27.0.12077973"
  OPENSSL_VERSION: "3.4.1"

jobs:
  # ==============================
  # Stage 1: Build native library
  # ==============================
  build-native:
    name: Build Native Libraries (libqbcore.so + OpenSSL)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v2

      - name: Install NDK & CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "ndk;${{ env.ANDROID_NDK_VERSION }}" \
            "cmake;3.22.1"

      - name: Verify NDK
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ ! -d "$NDK_PATH" ]; then
            echo "ERROR: NDK not found"
            ls "$ANDROID_HOME/ndk/" 2>/dev/null
            exit 1
          fi
          echo "NDK OK: $NDK_PATH"
          echo "NDK_PATH=$NDK_PATH" >> $GITHUB_ENV

      - name: Download OpenSSL static libs (arm64-v8a)
        run: |
          set -e
          cd /tmp
          curl -fsSL "https://github.com/217heidai/openssl_for_android/releases/download/${{ env.OPENSSL_VERSION }}/OpenSSL_${{ env.OPENSSL_VERSION }}_arm64-v8a.tar.gz" \
            -o openssl-arm64.tar.gz
          mkdir -p openssl-arm64
          tar -xzf openssl-arm64.tar.gz -C openssl-arm64 --strip-components=1

          # Verify
          for lib in libssl.a libcrypto.a; do
            if [ ! -f "openssl-arm64/lib/$lib" ]; then
              echo "ERROR: $lib not found"
              ls -la openssl-arm64/lib/
              exit 1
            fi
            echo "OK: openssl-arm64/lib/$lib ($(stat -c%s openssl-arm64/lib/$lib) bytes)"
          done

          echo "OPENSSL_DIR=$PWD/openssl-arm64" >> $GITHUB_ENV

      - name: Build libqbcore.so (CMake + NDK)
        run: |
          set -e
          mkdir -p build
          cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_ABI=arm64-v8a \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_DIR="$OPENSSL_DIR"

          cmake --build . -- -j$(nproc)

          # Verify
          QBCORE_SO=$(find . -name "libqbcore.so" | head -1)
          if [ -z "$QBCORE_SO" ]; then
            echo "ERROR: libqbcore.so not found"
            find . -name "*.so" -o -name "*.a" 2>/dev/null
            exit 1
          fi

          echo "Built: $QBCORE_SO"
          file "$QBCORE_SO"
          readelf -d "$QBCORE_SO" | grep NEEDED

          # Check static OpenSSL linking
          if readelf -d "$QBCORE_SO" | grep -q "libssl\.so\|libcrypto\.so"; then
            echo "ERROR: dynamically linked to OpenSSL (should be static)"
            exit 1
          fi
          echo "OK: OpenSSL statically linked"

      - name: Prepare jniLibs
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          cp build/libqbcore.so app/src/main/jniLibs/arm64-v8a/
          ls -la app/src/main/jniLibs/arm64-v8a/

      - name: Upload native artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/
          retention-days: 30

  # ==============================
  # Stage 2: Build APK
  # ==============================
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-native
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs

      - name: Verify native lib
        run: |
          SOFILE="app/src/main/jniLibs/arm64-v8a/libqbcore.so"
          if [ ! -f "$SOFILE" ]; then
            echo "ERROR: libqbcore.so not found"
            ls -laR app/src/main/jniLibs/ 2>/dev/null
            exit 1
          fi
          echo "OK: libqbcore.so found"
          file "$SOFILE"

      - name: Build APK
        env:
          CI_SKIP_NATIVE_BUILD: "1"
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon 2>&1 | tail -80

          # Show output
          APK_DIR="app/build/outputs/apk/debug"
          ls -la "$APK_DIR/" 2>/dev/null || echo "ERROR: APK output dir not found"
          find app/build/outputs -name "*.apk" 2>/dev/null

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: CI Stage Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "build-native: ${{ needs.build-native.result }}"
          echo "build-apk: ${{ job.status }}"
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "APK size: $(stat -c%s app/build/outputs/apk/debug/app-debug.apk) bytes"
          fi
