name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Prepare jniLibs with stub libraries
      run: |
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Create stub .so files
        for lib in libtorrent libssl libcrypto libboost_system libboost_filesystem libboost_date_time; do
          echo "STUB" > app/src/main/jniLibs/arm64-v8a/${lib}.so
        done
        ls -la app/src/main/jniLibs/arm64-v8a/
        
    - name: Build APK with verbose output
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        
        # Build with full output
        ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle_output.txt
        
        # Check what was created
        echo "=== Build outputs ==="
        find app/build -name "*.apk" 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK dir"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: |
          app/build/outputs/apk/debug/*.apk
          /tmp/gradle_output.txt