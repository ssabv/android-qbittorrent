name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step (1=hello-jni, 2=openssl, 3=boost, 4=libtorrent)'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Verify NDK toolchain
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        if [ ! -d "$NDK_PATH" ]; then
          echo "ERROR: NDK version $NDK_VERSION not found!"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDKs found"
          exit 1
        fi
        echo "Using NDK: $NDK_PATH"
        TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
        echo "Toolchain: $TOOLCHAIN"
        ls $TOOLCHAIN/bin/aarch64-linux-android*-clang 2>/dev/null | head -5

    - name: Build Step 1 - Hello JNI
      run: |
        set -e
        echo "=== Step 1: Building hello-jni.so ==="
        mkdir -p /tmp/hello-jni
        printf '#include <stdio.h>\nint sayHello() { printf("Hello from JNI!\\n"); return 42; }\n' > /tmp/hello-jni/hello.c
        printf 'cmake_minimum_required(VERSION 3.22.1)\nproject(hello-jni)\nadd_library(hello-jni SHARED hello.c)\n' > /tmp/hello-jni/CMakeLists.txt
        mkdir -p /tmp/hello-jni/build
        cd /tmp/hello-jni/build
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release
        cmake --build . -- -j$(nproc) 2>&1
        SO_FILE=$(find . -name "*.so" 2>/dev/null | head -1)
        echo "Found SO: $SO_FILE"

    - name: Build Step 2 - OpenSSL
      run: |
        set -e
        echo "=== Step 2: Building OpenSSL for Android arm64-v8a ==="
        
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
        
        export ANDROID_NDK=$NDK_PATH
        export PATH="$TOOLCHAIN/bin:$PATH"
        
        export CC="aarch64-linux-android24-clang"
        export CXX="aarch64-linux-android24-clang++"
        export AR="$TOOLCHAIN/bin/aarch64-linux-android-ar"
        export RANLIB="$TOOLCHAIN/bin/aarch64-linux-android-ranlib"
        export STRIP="$TOOLCHAIN/bin/aarch64-linux-android-strip"
        
        echo "CC: $CC"
        echo "NDK Path: $NDK_PATH"
        $CC --version | head -3
        
        mkdir -p /tmp/openssl-build
        cd /tmp/openssl-build
        
        if [ ! -f "/tmp/openssl-3.4.0.tar.gz" ]; then
          echo "Downloading OpenSSL 3.4.0..."
          curl -fsSL https://www.openssl.org/source/openssl-3.4.0.tar.gz -o /tmp/openssl-3.4.0.tar.gz
        fi
        
        echo "Extracting OpenSSL..."
        tar -xzf /tmp/openssl-3.4.0.tar.gz -C /tmp/openssl-build --strip-components=1
        
        echo "=== Configuring OpenSSL ==="
        ./Configure \
          android64-aarch64 \
          --prefix=/tmp/openssl-install \
          --openssldir=/tmp/openssl-install/ssl \
          -DANDROID_COMPILER_FLAGS="-target aarch64 -mandroid -fPIE" \
          CFLAGS="-target aarch64 -mandroid -fPIC -O3" \
          LDFLAGS="-target aarch64 -mandroid -fPIE" \
          2>&1 | tail -30
        
        echo "=== Building OpenSSL ==="
        make -j$(nproc) 2>&1 | tail -30
        
        echo "=== Installing OpenSSL ==="
        make install_sw 2>&1 | tail -20
        
        echo "=== Verifying built libraries ==="
        ls -la /tmp/openssl-install/lib/libssl.so /tmp/openssl-install/lib/libcrypto.so 2>/dev/null || echo "Libs not found"
        /tmp/openssl-install/bin/openssl version
        
        file /tmp/openssl-install/lib/libssl.so
        file /tmp/openssl-install/lib/libcrypto.so
        
        echo "=== Library sizes ==="
        ls -lh /tmp/openssl-install/lib/libssl.so /tmp/openssl-install/lib/libcrypto.so

    - name: Copy to jniLibs
      run: |
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        
        cp /tmp/openssl-install/lib/libssl.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        cp /tmp/openssl-install/lib/libcrypto.so $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        
        SO_FILE=$(find /tmp/hello-jni/build -name "*.so" 2>/dev/null | head -1)
        if [ -n "$SO_FILE" ] && [ -f "$SO_FILE" ]; then
          cp "$SO_FILE" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libhello-jni.so
        fi
        
        echo "=== jniLibs/arm64-v8a contents ==="
        ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        
        echo "=== Verify OpenSSL libs ==="
        file $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libssl.so
        file $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libcrypto.so
        
        echo "=== readelf -d libssl.so ==="
        readelf -d $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/libssl.so | head -15

    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: build-native

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Download native artifact
      id: download-native
      uses: actions/download-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a

    - name: Check downloaded files
      run: |
        echo "=== Downloaded jniLibs ==="
        ls -la app/src/main/jniLibs/arm64-v8a/
        
        echo "=== Verify libssl.so ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libssl.so" ]; then
          echo "SUCCESS: libssl.so exists"
          file app/src/main/jniLibs/arm64-v8a/libssl.so
          readelf -d app/src/main/jniLibs/arm64-v8a/libssl.so | head -10
        else
          echo "ERROR: libssl.so not found!"
          exit 1
        fi
        
        echo "=== Verify libcrypto.so ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libcrypto.so" ]; then
          echo "SUCCESS: libcrypto.so exists"
          file app/src/main/jniLibs/arm64-v8a/libcrypto.so
          readelf -d app/src/main/jniLibs/arm64-v8a/libcrypto.so | head -10
        else
          echo "ERROR: libcrypto.so not found!"
          exit 1
        fi

    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        echo "=== Starting Gradle build ==="
        ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle-output.txt
        echo "=== Gradle output (last 200 lines) ==="
        tail -200 /tmp/gradle-output.txt

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk