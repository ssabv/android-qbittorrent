name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          echo "SDK/NDK setup complete"

      - name: Build OpenSSL static libs (already done or reuse)
        run: |
          echo "Using prebuilt OpenSSL at /tmp/openssl-arm64"

      - name: Build Boost static libraries for Android arm64-v8a
        shell: bash
        run: |
          set -e

          BOOST_VERSION="1.87.0"
          BOOST_DIR=$PWD/boost
          BOOST_TAR="boost_${BOOST_VERSION}.tar.gz"

          echo "=== Downloading Boost $BOOST_VERSION ==="

          for url in \
            "https://archives.boost.io/release/${BOOST_VERSION}/source/${BOOST_TAR}" \
            "https://mirrors.edge.kernel.org/gentoo/distfiles/${BOOST_TAR}" \
            "https://sourceforge.net/projects/boost/files/boost/${BOOST_VERSION}/${BOOST_TAR}/download"
          do
            echo "Trying: $url"
            rm -f "$BOOST_TAR"
            if curl -L --connect-timeout 30 --max-time 300 -o "$BOOST_TAR" "$url"; then
              FILE_TYPE=$(file "$BOOST_TAR" 2>/dev/null || echo "unknown")
              echo "File type: $FILE_TYPE"
              if [[ "$FILE_TYPE" == *"gzip"* ]] || [[ "$FILE_TYPE" == *"tar"* ]]; then
                echo "Success! Got valid archive"
                break
              fi
            fi
            echo "Failed, trying next URL..."
          done

          FILE_TYPE=$(file "$BOOST_TAR" 2>/dev/null || echo "unknown")
          echo "Final file type: $FILE_TYPE"

          if [[ ! "$FILE_TYPE" == *"gzip"* ]] && [[ ! "$FILE_TYPE" == *"tar"* ]]; then
            echo "ERROR: All download attempts failed"
            ls -la "$BOOST_TAR" 2>/dev/null || echo "File not found"
            head -c 500 "$BOOST_TAR" 2>/dev/null || true
            exit 1
          fi

          echo "=== Extracting Boost source ==="
          rm -rf "$BOOST_DIR"
          mkdir -p "$BOOST_DIR"
          tar -xzf "$BOOST_TAR" -C "$BOOST_DIR" --strip-components=1
          ls -la "$BOOST_DIR/"

          export NDK=/usr/local/lib/android/sdk/ndk/27.0.12077973
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export ANDROID_API=35
          export ABI=arm64-v8a
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=$TOOLCHAIN/bin/aarch64-linux-android$ANDROID_API-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android$ANDROID_API-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          cd "$BOOST_DIR"
          ./bootstrap.sh
          ./b2 toolset=clang \
            cxxflags="-fPIC -fexceptions -frtti" link=static threading=multi \
            --with-system --with-filesystem --with-date_time --with-thread --with-regex \
            target-os=android architecture=arm address-model=64 abi=aapcs stage

          echo "Boost static libs built:"
          ls -lh stage/lib

      - name: Build libqbcore.so
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-$ANDROID_API \
            -DANDROID_STL=c++_shared \
            -DBOOST_ROOT=$BOOST_DIR \
            -DOPENSSL_ROOT_DIR=/tmp/openssl-arm64
          cmake --build . --target qbcore

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: build/libqbcore.so

  build-apk:
    needs: build-native
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          cd app
          ./gradlew assembleDebug
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk