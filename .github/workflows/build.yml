name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NDK: /usr/local/lib/android/sdk/ndk/27.0.12077973
      ANDROID_API: 35
      ABI: arm64-v8a
    steps:
- name: Checkout code
        uses: actions/checkout@v5

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-libqbcore
          path: app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          cd app
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk