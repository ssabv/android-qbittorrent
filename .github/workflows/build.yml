name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Download libtorrent artifact
      id: download-lib
      uses: actions/download-artifact@v4
      with:
        name: android-libtorrent-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a
        
    - name: Check downloaded files
      run: |
        echo "=== Downloaded jniLibs ==="
        ls -la app/src/main/jniLibs/arm64-v8a/
        
        # Check if files exist
        if [ ! -f "app/src/main/jniLibs/arm64-v8a/libtorrent.so" ]; then
          echo "WARNING: libtorrent.so not found!"
          echo "Please run build-libtorrent.yml workflow first"
        fi
        
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        
        echo "=== Starting Gradle build ==="
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -100
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk