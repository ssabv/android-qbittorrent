name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK and CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Verify NDK toolchain
        run: |
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"
          if [ ! -d "$NDK_PATH" ]; then
            echo "ERROR: NDK 27.0.12077973 not found"
            ls "$ANDROID_HOME/ndk/" 2>/dev/null
            exit 1
          fi
          echo "NDK OK: $NDK_PATH"

      - name: Download OpenSSL static libs (arm64-v8a)
        run: |
          set -e
          cd /tmp
          curl -fsSL "https://github.com/217heidai/openssl_for_android/releases/download/3.4.1/OpenSSL_3.4.1_arm64-v8a.tar.gz" -o openssl-arm64.tar.gz
          mkdir -p openssl-arm64 && tar -xzf openssl-arm64.tar.gz -C openssl-arm64 --strip-components=1

          # Verify
          for lib in libssl.a libcrypto.a; do
            if [ ! -f "openssl-arm64/lib/$lib" ]; then
              echo "ERROR: $lib not found"
              ls -la openssl-arm64/lib/
              exit 1
            fi
            echo "OK: openssl-arm64/lib/$lib ($(stat -c%s openssl-arm64/lib/$lib) bytes)"
          done

          echo "OPENSSL_DIR=$PWD/openssl-arm64" >> $GITHUB_ENV

      - name: Build libqbcore.so
        run: |
          set -e
          NDK_PATH="$ANDROID_HOME/ndk/27.0.12077973"

          mkdir -p app/src/main/cpp/build
          cd app/src/main/cpp/build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$NDK_PATH/build/cmake/android.toolchain.cmake" \
            -DANDROID_PLATFORM=android-24 \
            -DANDROID_ABI=arm64-v8a \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_DIR="$OPENSSL_DIR"

          cmake --build . -- -j$(nproc)

          # Find and verify the built library
          QBCORE_SO=$(find . -name "libqbcore.so" | head -1)
          if [ -z "$QBCORE_SO" ]; then
            echo "ERROR: libqbcore.so not found"
            find . -name "*.so" -o -name "*.a" 2>/dev/null
            exit 1
          fi

          echo "Built: $QBCORE_SO"
          file "$QBCORE_SO"
          readelf -d "$QBCORE_SO" | grep NEEDED

          # Verify static OpenSSL linking
          if readelf -d "$QBCORE_SO" | grep -q "libssl\.so\|libcrypto\.so"; then
            echo "ERROR: dynamically linked to OpenSSL (should be static)"
            exit 1
          fi
          echo "OK: OpenSSL statically linked"

          # Copy to jniLibs
          mkdir -p "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a"
          cp "$QBCORE_SO" "$GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a/
          retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: build-native

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Install NDK and CMake
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a

      - name: Verify & Build APK
        run: |
          # Verify native lib
          SOFILE="app/src/main/jniLibs/arm64-v8a/libqbcore.so"
          if [ ! -f "$SOFILE" ]; then
            echo "ERROR: libqbcore.so not found"
            ls -la app/src/main/jniLibs/arm64-v8a/ 2>/dev/null
            exit 1
          fi
          echo "OK: libqbcore.so found"
          file "$SOFILE"

          # Build APK
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -80

          # Show output
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "WARNING: APK output dir not found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
