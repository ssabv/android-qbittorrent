name: Android Build

on:
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # -----------------------
      # Stage 1: Checkout code
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          echo "SDK/NDK setup complete"

      # -----------------------
      # Stage 2: OpenSSL static linking
      # -----------------------
      - name: Prepare OpenSSL static libs
        run: |
          echo "Assume OpenSSL static libs exist at /tmp/openssl-arm64/lib"

      # -----------------------
      # Stage 3: Boost static libraries for arm64-v8a
      # -----------------------
      - name: Build Boost for Android arm64-v8a
        shell: bash
        run: |
          set -e
          BOOST_DIR=$PWD/boost
          mkdir -p "$BOOST_DIR"

          # 假设源码已存在，或提前上传 artifact
          echo "Using local Boost source in $BOOST_DIR"

          # 设置 Android 工具链
          export NDK=/usr/local/lib/android/sdk/ndk/27.0.12077973
          export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          export ANDROID_API=35
          export ABI=arm64-v8a
          export PATH=$TOOLCHAIN/bin:$PATH
          export CC=$TOOLCHAIN/bin/aarch64-linux-android$ANDROID_API-clang
          export CXX=$TOOLCHAIN/bin/aarch64-linux-android$ANDROID_API-clang++
          export AR=$TOOLCHAIN/bin/llvm-ar
          export RANLIB=$TOOLCHAIN/bin/llvm-ranlib

          cd "$BOOST_DIR"
          ./bootstrap.sh
          ./b2 toolset=clang cxxflags="-fPIC -fexceptions -frtti" link=static threading=multi \
              --with-system --with-filesystem --with-date_time --with-thread --with-regex stage

          echo "Boost static libs built:"
          ls -lh stage/lib

      # -----------------------
      # Stage 3: Build libqbcore.so
      # -----------------------
      - name: Build libqbcore.so
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-$ANDROID_API \
            -DANDROID_STL=c++_shared \
            -DBOOST_ROOT=$BOOST_DIR \
            -DOPENSSL_ROOT_DIR=/tmp/openssl-arm64
          cmake --build . --target qbcore

      # -----------------------
      # Stage 3: Upload native artifact
      # -----------------------
      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: build/libqbcore.so

  build-apk:
    needs: build-native
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # -----------------------
      # Stage 1: Checkout code
      # -----------------------
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

      # -----------------------
      # Stage 3: Download native artifact
      # -----------------------
      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a

      # -----------------------
      # Stage 4: Build APK
      # -----------------------
      - name: Build APK
        run: |
          cd app
          ./gradlew assembleDebug

      # -----------------------
      # Stage 4: Upload APK artifact
      # -----------------------
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk