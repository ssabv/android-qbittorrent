name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Download precompiled libraries
      run: |
        # Create jniLibs directory
        mkdir -p app/src/main/jniLibs/arm64-v8a
        
        # Download libtorrent for Android (prebuilt)
        # Using a known working prebuilt libtorrent 2.0.9 for Android
        LIBTORRENT_URL="https://github.com/nickcoutsos/android-libtorrent/releases/download/v2.0.9-rc1/libtorrent-2.0.9-arm64-v8a.so"
        curl -L -o app/src/main/jniLibs/arm64-v8a/libtorrent.so "$LIBTORRENT_URL" || \
        wget -q -O app/src/main/jniLibs/arm64-v8a/libtorrent.so "$LIBTORRENT_URL"
        
        # Download OpenSSL for Android
        OPENSSL_URL="https://github.com/nickcoutsos/android-libtorrent/releases/download/v2.0.9-rc1/openssl-3.2.1-arm64-v8a.so"
        curl -L -o app/src/main/jniLibs/arm64-v8a/libssl.so "$OPENSSL_URL" || \
        wget -q -O app/src/main/jniLibs/arm64-v8a/libssl.so "$OPENSSL_URL"
        
        curl -L -o app/src/main/jniLibs/arm64-v8a/libcrypto.so "$OPENSSL_URL" || \
        wget -q -O app/src/main/jniLibs/arm64-v8a/libcrypto.so "$OPENSSL_URL"
        
        # Download Boost for Android
        BOOST_URL="https://github.com/nickcoutsos/android-libtorrent/releases/download/v2.0.9-rc1/boost-1.84-arm64-v8a.tar.gz"
        curl -L -o /tmp/boost.tar.gz "$BOOST_URL" || wget -q -O /tmp/boost.tar.gz "$BOOST_URL"
        tar -xzf /tmp/boost.tar.gz -C app/src/main/jniLibs/arm64-v8a/
        
        # List downloaded files
        ls -la app/src/main/jniLibs/arm64-v8a/
        
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload debug symbols
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-symbols
        path: app/build/outputs/mapping/**/mapping.txt