name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-native:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NDK: /usr/local/lib/android/sdk/ndk/27.0.12077973
      ANDROID_API: 35
      ABI: arm64-v8a
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK & NDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

      # Stage 2: OpenSSL static libs
      - name: Download OpenSSL static libs
        run: |
          echo "=== OpenSSL for Android arm64-v8a ==="
          cd /tmp
          curl -L -o openssl-arm64.tar.gz "https://github.com/217heidai/openssl_for_android/releases/download/3.4.1/OpenSSL_3.4.1_arm64-v8a.tar.gz"
          mkdir -p openssl-arm64
          tar -xzf openssl-arm64.tar.gz -C openssl-arm64 --strip-components=1
          ls -la openssl-arm64/lib/
          echo "OPENSSL_DIR=/tmp/openssl-arm64" >> $GITHUB_ENV

      # Stage 3: Build libqbcore.so (OpenSSL only, skip Boost for now)
      - name: Build libqbcore.so
        run: |
          echo "=== Building libqbcore.so ==="
          echo "OPENSSL_DIR: $OPENSSL_DIR"
          
          cd $GITHUB_WORKSPACE
          mkdir -p app/src/main/cpp/build
          cd app/src/main/cpp/build
          
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=$ABI \
            -DANDROID_PLATFORM=android-$ANDROID_API \
            -DANDROID_STL=c++_shared \
            -DOPENSSL_DIR=$OPENSSL_DIR 2>&1 | tail -30
          
          cmake --build . --target qbcore 2>&1 | tail -50

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/cpp/build/libqbcore.so

  build-apk:
    needs: build-native
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip wget
          export ANDROID_HOME=/usr/local/lib/android/sdk

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: android-native-arm64-v8a
          path: app/src/main/jniLibs/arm64-v8a

      - name: Build APK
        run: |
          cd $GITHUB_WORKSPACE/app
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk