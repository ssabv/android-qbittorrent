name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"
        
    - name: Build libtorrent
      run: |
        # Download and build Boost
        cd third_party
        wget -q https://boostorg.jfrog.io/artifactory/main/release/1.84.0/source/boost_1_84_0.tar.gz
        tar -xzf boost_1_84_0.tar.gz
        cd boost_1_84_0
        ./bootstrap.sh --prefix=../boost-install --with-libraries=system,filesystem,date_time
        ./b2 install toolset=clang variant=release link=static threading=multi cxxstd=17 -j$(nproc)
        
        # Download and build OpenSSL
        cd ../..
        wget -q https://github.com/openssl/openssl/releases/download/openssl-3.2.1/openssl-3.2.1.tar.gz
        tar -xzf openssl-3.2.1.tar.gz
        cd openssl-3.2.1
        ./Configure android-arm64 --prefix=../openssl-install
        make -j$(nproc)
        make install_sw
        
        # Download and build libtorrent
        cd ../..
        wget -q https://github.com/arvidn/libtorrent/releases/download/v2.0.9/libtorrent-2.0.9.tar.gz
        tar -xzf libtorrent-2.0.9.tar.gz
        cd libtorrent-2.0.9
        ./configure --prefix=../libtorrent-install --enable-arch=native --disable-shared-encryption --with-boost=../boost-install --with-openssl=../openssl-install --host=aarch64-linux-android CXXFLAGS="-stdlib=libc++" CXX=aarch64-linux-android32-clang++
        make -j$(nproc)
        make install
        
    - name: Build APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk