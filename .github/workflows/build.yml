name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      step:
        description: 'Build step'
        default: '1'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-native:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Verify NDK toolchain
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
        NDK_VERSION="27.0.12077973"
        NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
        if [ ! -d "$NDK_PATH" ]; then
          echo "ERROR: NDK version $NDK_VERSION not found!"
          ls $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDKs found"
          exit 1
        fi
        echo "Using NDK: $NDK_PATH"
        TOOLCHAIN="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64"
        echo "Toolchain: $TOOLCHAIN"
        ls $TOOLCHAIN/bin/aarch64-linux-android*-clang 2>/dev/null | head -5

    - name: Build Step 1 - Download OpenSSL static libs
      run: |
        set -e
        echo "=== Step 1: Getting OpenSSL for Android arm64-v8a ==="

        cd /tmp

        echo "=== Downloading OpenSSL 3.4.1 static libs for arm64-v8a ==="
        curl -fsSL "https://github.com/217heidai/openssl_for_android/releases/download/3.4.1/OpenSSL_3.4.1_arm64-v8a.tar.gz" -o openssl-arm64.tar.gz

        echo "=== Extracting ==="
        mkdir -p openssl-arm64 && tar -xzf openssl-arm64.tar.gz -C openssl-arm64 --strip-components=1

        echo "=== Checking contents ==="
        ls -la openssl-arm64/
        ls -la openssl-arm64/lib/

        SSL_LIB="$PWD/openssl-arm64/lib/libssl.a"
        CRYPTO_LIB="$PWD/openssl-arm64/lib/libcrypto.a"

        echo "=== Verifying static libs ==="
        if [ -f "$SSL_LIB" ]; then
          echo "FOUND libssl.a: $SSL_LIB"
          file "$SSL_LIB"
          ls -lh "$SSL_LIB"
        else
          echo "ERROR: libssl.a not found at $SSL_LIB"
          exit 1
        fi

        if [ -f "$CRYPTO_LIB" ]; then
          echo "FOUND libcrypto.a: $CRYPTO_LIB"
          file "$CRYPTO_LIB"
          ls -lh "$CRYPTO_LIB"
        else
          echo "ERROR: libcrypto.a not found at $CRYPTO_LIB"
          exit 1
        fi

        OPENSSL_DIR="$PWD/openssl-arm64"
        echo "OPENSSL_DIR=$OPENSSL_DIR" >> $GITHUB_ENV
        echo "Set OPENSSL_DIR=$OPENSSL_DIR"

    - name: Build Step 2 - Download Boost static libs
      run: |
        set -e
        echo "=== Step 2: Getting Boost for Android arm64-v8a ==="

        cd /tmp

        echo "=== Downloading Boost 1.87.0 static libs for arm64-v8a (dec1/Boost-for-Android) ==="
        curl -fsSL "https://github.com/dec1/Boost-for-Android/releases/download/ndk_27c_boost_1.87.0/ndk_27c_boost_1.87.0.zip" -o boost-arm64.zip

        echo "=== Extracting ==="
        mkdir -p boost-arm64 && unzip -q boost-arm64.zip -d boost-arm64 --strip-components=1

        echo "=== Checking contents ==="
        ls -la boost-arm64/
        ls -la boost-arm64/libs/ 2>/dev/null || ls -la boost-arm64/lib/ 2>/dev/null || echo "Checking structure..."

        BOOST_LIB="$PWD/boost-arm64/libs/arm64-v8a"
        if [ ! -d "$BOOST_LIB" ]; then
          BOOST_LIB="$PWD/boost-arm64/lib/arm64-v8a"
        fi
        if [ ! -d "$BOOST_LIB" ]; then
          BOOST_LIB="$PWD/boost-arm64/lib"
        fi
        echo "BOOST_LIB path: $BOOST_LIB"
        ls -la "$BOOST_LIB/"

        echo "=== Verifying Boost static libs ==="
        for lib in boost_system boost_filesystem boost_date_time boost_thread boost_regex; do
          if [ -f "$BOOST_LIB/lib${lib}.a" ]; then
            echo "FOUND lib${lib}.a: $BOOST_LIB/lib${lib}.a"
            ls -lh "$BOOST_LIB/lib${lib}.a"
          else
            echo "WARNING: lib${lib}.a not found, checking..."
            find boost-arm64 -name "lib${lib}.a" 2>/dev/null | head -3
          fi
        done

        BOOST_DIR="$PWD/boost-arm64"
        BOOST_LIB_PATH="$BOOST_LIB"
        echo "BOOST_DIR=$BOOST_DIR" >> $GITHUB_ENV
        echo "BOOST_LIB_PATH=$BOOST_LIB_PATH" >> $GITHUB_ENV
        echo "Set BOOST_DIR=$BOOST_DIR"
        echo "Set BOOST_LIB_PATH=$BOOST_LIB_PATH"

    - name: Build Step 3 - Build libqbcore.so with OpenSSL + Boost static linking
      run: |
        set -e
        echo "=== Step 3: Building libqbcore.so with OpenSSL + Boost static linking ==="

        cd $GITHUB_WORKSPACE
        NDK_PATH=$ANDROID_HOME/ndk/27.0.12077973

        echo "OPENSSL_DIR=$OPENSSL_DIR"
        echo "BOOST_DIR=$BOOST_DIR"
        echo "BOOST_LIB_PATH=$BOOST_LIB_PATH"

        mkdir -p app/src/main/cpp/build
        cd app/src/main/cpp/build

        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_ABI=arm64-v8a \
          -DCMAKE_BUILD_TYPE=Release \
          -DOPENSSL_DIR=$OPENSSL_DIR \
          -DBOOST_DIR=$BOOST_DIR \
          -DBOOST_LIB_PATH=$BOOST_LIB_PATH

        echo "=== CMake configuration ==="
        head -30 CMakeFiles/qbcore.dir/flags.make 2>/dev/null || echo "No flags.make found"

        echo "=== Building qbcore ==="
        cmake --build . -- -j$(nproc) 2>&1

        echo "=== Checking built library ==="
        QBCORE_SO=$(find . -name "libqbcore.so" 2>/dev/null | head -1)
        if [ -n "$QBCORE_SO" ] && [ -f "$QBCORE_SO" ]; then
          echo "SUCCESS: Built $QBCORE_SO"
          ls -lh "$QBCORE_SO"
          file "$QBCORE_SO"
        else
          echo "ERROR: libqbcore.so not found after build"
          ls -la
          find . -name "*.so" 2>/dev/null
          exit 1
        fi

        echo "=== readelf -d libqbcore.so ==="
        readelf -d "$QBCORE_SO" | head -20

        echo "=== Required libraries ==="
        readelf -d "$QBCORE_SO" | grep "NEEDED"

        echo "=== Verifying: no libssl.so or libcrypto.so ==="
        if readelf -d "$QBCORE_SO" | grep -q "libssl.so\|libcrypto.so"; then
          echo "ERROR: libqbcore.so depends on libssl.so or libcrypto.so (should be statically linked)"
          exit 1
        else
          echo "GOOD: libqbcore.so does NOT depend on libssl.so or libcrypto.so"
        fi

        echo "=== Verifying: no boost_*.so ==="
        if readelf -d "$QBCORE_SO" | grep -q "boost_"; then
          echo "ERROR: libqbcore.so depends on boost_*.so (should be statically linked)"
          readelf -d "$QBCORE_SO" | grep "boost_"
          exit 1
        else
          echo "GOOD: libqbcore.so does NOT depend on boost_*.so"
        fi

        echo "=== Verifying: has libc++_shared.so ==="
        if readelf -d "$QBCORE_SO" | grep -q "libc++_shared.so"; then
          echo "GOOD: libqbcore.so depends on libc++_shared.so"
        else
          echo "WARNING: libqbcore.so does not depend on libc++_shared.so"
        fi

        echo "=== Copying to jniLibs ==="
        mkdir -p $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a
        cp "$QBCORE_SO" $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/
        ls -la $GITHUB_WORKSPACE/app/src/main/jniLibs/arm64-v8a/

    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a/
        retention-days: 30

  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    needs: build-native

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK and CMake
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

    - name: Download native artifact
      id: download-native
      uses: actions/download-artifact@v4
      with:
        name: android-native-arm64-v8a
        path: app/src/main/jniLibs/arm64-v8a

    - name: Build APK
      run: |
        echo "=== Downloaded jniLibs ==="
        ls -la app/src/main/jniLibs/arm64-v8a/

        echo "=== Verify libqbcore.so ==="
        if [ -f "app/src/main/jniLibs/arm64-v8a/libqbcore.so" ]; then
          echo "SUCCESS: libqbcore.so exists"
          file app/src/main/jniLibs/arm64-v8a/libqbcore.so
          readelf -d app/src/main/jniLibs/arm64-v8a/libqbcore.so | head -20
        else
          echo "ERROR: libqbcore.so not found!"
          exit 1
        fi

        echo "=== Build APK ==="
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        export JAVA_HOME=$JAVA_HOME_17_X64
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -80

        echo "=== APK Build Complete ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK dir not found"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk